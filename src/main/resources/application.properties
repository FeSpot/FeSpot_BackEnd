security.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:1800}
security.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:1209600}

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
